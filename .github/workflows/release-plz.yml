name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.FGPAT_RELEASE_TAP }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.FGPAT_RELEASE_TAP }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Find release PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.FGPAT_RELEASE_TAP }}
        run: |
          pr_number=""
          for _ in $(seq 1 12); do
            pr_number="$(gh pr list --state open --base main --json number,title,headRefName,updatedAt --jq 'map(select(.title == "release-plz: prepare release" and (.headRefName | startswith("release-plz-")))) | sort_by(.updatedAt) | last | .number // empty')"
            if [ -n "$pr_number" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$pr_number" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Wait for checks
        if: ${{ steps.pr.outputs.found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.FGPAT_RELEASE_TAP }}
        run: |
          for _ in $(seq 1 24); do
            check_count="$(gh pr view "${{ steps.pr.outputs.number }}" --json statusCheckRollup --jq '.statusCheckRollup | length')"
            if [ "$check_count" -gt 0 ]; then
              gh pr checks "${{ steps.pr.outputs.number }}" --watch --fail-fast
              exit $?
            fi
            sleep 10
          done

          echo "timed out waiting for checks to appear on PR ${{ steps.pr.outputs.number }}" >&2
          exit 1

      - name: Merge release PR
        if: ${{ steps.pr.outputs.found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.FGPAT_RELEASE_TAP }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --merge --delete-branch
